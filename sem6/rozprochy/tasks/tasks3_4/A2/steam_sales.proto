syntax = "proto3";

option java_multiple_files = true;
option java_package = "gen.steam.sales";

package steam.sales;

import "google/protobuf/empty.proto";

// data for subscribtion and mofifying it
message RequestData {
  string client_id = 1;
  repeated string tags = 2;
}

// data for unsubscribing
message UnsubscribeRequestData {
  string client_id = 1;
}

// enum informing of protondb rank
enum ProtonDbRank {
  NATIVE = 0;
  PLATINUM = 1;
  GOLD = 2;
  SILVER = 3;
  BRONZE = 4;
}

// sale information sub struct
message SaleInfo {
  double original_price = 1;
  double sale_price = 2;
  int32 discount_percent = 3;
}

// sale notification
message SaleNotification {
  string game_title = 1;
  repeated string game_tags = 2;
  SaleInfo sale_information = 3;
  ProtonDbRank protondb_rank = 4;
}

service SalesSubscriptionService {
  rpc Subscribe(RequestData) returns (stream SaleNotification);
  rpc AddTags(RequestData) returns (google.protobuf.Empty);
  rpc RemoveTags(RequestData) returns (google.protobuf.Empty);
  rpc Unsubscribe(UnsubscribeRequestData) returns (google.protobuf.Empty);
}
